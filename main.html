<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>監視コントロールパネル</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, deleteDoc, doc, onSnapshot, serverTimestamp, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js";

     // 【重要】新しいFirebaseプロジェクトの設定をここに貼る
    const firebaseConfig = {
        apiKey: "AIzaSyBCwEb0nAynWlcIYloAwwdDQocXgD1W8DQ",
  authDomain: "user-cd2c1.firebaseapp.com",
  projectId: "user-cd2c1",
  storageBucket: "user-cd2c1.firebasestorage.app",
  messagingSenderId: "990277200920",
  appId: "1:990277200920:web:952d974484fa76ed89e76d",
    };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const messaging = getMessaging(app);

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = 'index.html';
            } else {
                loadKeywords(user.uid);
                loadLatestAnalysis();
                setupNotifications(user.uid);
            }
        });

        // キーワード読み込み
        async function loadKeywords(uid) {
            const q = query(collection(db, "keywords"), where("user_id", "==", uid));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('keywords-list');
                list.innerHTML = '';
                snapshot.forEach((d) => {
                    const data = d.data();
                    list.innerHTML += `<li>${data.keyword} <button onclick="deleteKeyword('${d.id}')">削除</button></li>`;
                });
            });
        }

        // キーワード追加
        window.addKeyword = async () => {
            const input = document.getElementById('keyword-input');
            if (input.value && auth.currentUser) {
                await addDoc(collection(db, "keywords"), {
                    user_id: auth.currentUser.uid,
                    keyword: input.value,
                    created_at: serverTimestamp()
                });
                input.value = '';
            }
        };

        // 通知設定
        async function setupNotifications(uid) {
            try {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    const token = await getToken(messaging, { vapidKey: 'YOUR_PUBLIC_VAPID_KEY' });
                    if (token) {
                        // 重複保存を防ぐため、一旦全削除して入れ直すか、特定の方法で保存
                        await addDoc(collection(db, "subscriptions"), {
                            user_id: uid,
                            fcm_token: token,
                            updated_at: serverTimestamp()
                        });
                    }
                }
            } catch (e) { console.error("通知設定エラー", e); }
        }

        // 最新解析結果
        async function loadLatestAnalysis() {
            const q = query(collection(db, "analysis_logs"), orderBy("updated_at", "desc"), limit(1));
            onSnapshot(q, (snapshot) => {
                if (!snapshot.empty) {
                    const data = snapshot.docs[0].data();
                    document.getElementById('latest-analysis').innerText = data.content;
                }
            });
        }

        window.deleteKeyword = async (id) => { await deleteDoc(doc(db, "keywords", id)); };
        window.logout = () => signOut(auth);
    </script>
</head>
<body>
    <button onclick="logout()">ログアウト</button>
    <input type="text" id="keyword-input"><button onclick="addKeyword()">追加</button>
    <ul id="keywords-list"></ul>
    <div id="latest-analysis"></div>
</body>
</html>
