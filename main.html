<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>監視コントロールパネル (Debug Mode)</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 余白の基本単位 */
            --gap-main: 10px;
            
            --bg: #fdf6ee;
            --card: #fffaf5;
            --border: #f0e4d0;
            --accent: #d97a4a;
            --accent-light: #faeee4;
            --accent-mid: #e8a07a;
            --text-main: #3a2c1e;
            --text-sub: #a08060;
            --tag-bg: #fdecd8;
            --tag-text: #a05a2a;
            --tag-border: #f5d4b0;
            --shadow: 0 4px 20px rgba(180,110,60,0.08);
            --shadow-hover: 0 8px 30px rgba(180,110,60,0.14);
            --insta: linear-gradient(135deg, #f9c784 0%, #f07167 42%, #d63384 78%, #9b59b6 100%);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { overflow-x: hidden; touch-action: pan-y; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 15% 0%, rgba(240,160,100,0.18) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 100%, rgba(249,200,140,0.15) 0%, transparent 55%);
            min-height: 100vh;
            padding: 32px 16px 80px;
            color: var(--text-main);
            display: flex;
            justify-content: center;
        }

        /* コンテナとメインコンテンツの間隔を統一 */
        .container, #main-content {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: var(--gap-main);
        }

        /* カードの基本デザイン */
        .card {
            background: var(--card);
            border-radius: 24px;
            padding: 24px;
            box-shadow: none;
            border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:hover { transform: translateY(-2px); box-shadow: none; }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
        }
        .card-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-main);
        }
        .icon-wrap {
            width: 36px; height: 36px;
            border-radius: 12px;
            background: var(--accent-light);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .icon-wrap svg { width: 18px; height: 18px; stroke: var(--accent); fill: none; stroke-width: 2; }

        /* ボタンデザイン */
        .btn-insta {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: var(--insta); color: white; text-decoration: none;
            padding: 18px; border-radius: 20px; font-weight: 600; font-size: 0.95rem;
            box-shadow: 0 6px 20px rgba(214,51,132,0.25);
            transition: all 0.2s;
        }
        .btn-insta:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(214,51,132,0.35); }

        .btn-primary {
            display: inline-flex; align-items: center; justify-content: center; gap: 10px;
            background: linear-gradient(135deg, var(--accent-mid) 0%, var(--accent) 100%);
            color: white; border: none; padding: 14px; border-radius: 16px;
            font-family: inherit; font-weight: 600; cursor: pointer; width: 100%;
            box-shadow: 0 4px 15px rgba(217, 122, 74, 0.25);
            transition: all 0.2s;
        }
        .btn-primary:hover { opacity: 0.9; transform: scale(1.01); }

        .btn-sub {
            background: none; border: 1.5px solid var(--border); color: var(--text-sub);
            padding: 8px 16px; border-radius: 12px; font-size: 0.85rem; font-weight: 500;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-sub:hover { background: var(--accent-light); color: var(--accent); border-color: var(--accent-mid); }

        /* スイッチ */
        .switch { position: relative; display: inline-block; width: 50px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; inset: 0;
            background: #e8d8c8; transition: .3s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px;
            background: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background: var(--accent); }
        input:checked + .slider:before { transform: translateX(22px); }

        .status { font-size: 0.8rem; color: var(--text-sub); margin-top: 12px; }

        /* キーワード入力 */
        .input-group { display: flex; gap: 10px; margin-bottom: 16px; }
        input[type="text"] {
            flex: 1; padding: 12px 16px; border: 1.5px solid var(--border);
            border-radius: 14px; font-family: inherit; font-size: 0.95rem;
            background: #fffdf9; outline: none; transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: var(--accent-mid); }
        .btn-add {
            background: var(--accent); color: white; border: none; width: 48px;
            border-radius: 14px; font-size: 1.4rem; cursor: pointer;
        }

        #keywords-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .keyword-tag {
            background: var(--tag-bg); color: var(--tag-text);
            padding: 6px 14px; border-radius: 20px; font-size: 0.85rem;
            border: 1px solid var(--tag-border); display: flex; align-items: center;
        }
        .btn-del { margin-left: 8px; color: var(--accent); cursor: pointer; border: none; background: none; font-weight: bold; }

        /* ログ・画像 */
        .log-content {
            background: #fdf0e4; color: #7a4020; padding: 16px; border-radius: 16px;
            font-family: 'Courier New', monospace; font-size: 0.85rem;
            line-height: 1.6; border: 1px solid #f0d8b8; max-height: 250px; overflow-y: auto;
        }
        .image-grid { display: flex; gap: 12px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 4px; }
        .image-item { flex: 0 0 110px; aspect-ratio: 1; border-radius: 14px; overflow: hidden; border: 1px solid var(--border); }
        .image-item img { width: 100%; height: 100%; object-fit: cover; }

        /* テーマ切替 */
        .theme-btn-group { display: flex; gap: 10px; }
        .theme-btn {
            width: 34px; height: 34px; border-radius: 50%; border: 2.5px solid transparent;
            background: none; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .theme-btn.active { border-color: var(--accent); transform: scale(1.1); }
        .theme-swatch { width: 24px; height: 24px; border-radius: 50%; }
        .swatch-warm { background: linear-gradient(135deg, #faeee4, #d97a4a); }
        .swatch-cool { background: linear-gradient(135deg, #e8f0fb, #6fa3d8); }
        .swatch-mono { background: linear-gradient(135deg, #e8e8e8, #444444); }

        /* 各テーマのスタイル定義 */
        :root[data-theme="cool"] {
            --bg: #f0f5fc; --card: #f8fbff; --border: #d0e0f0; --accent: #4a7abf;
            --accent-light: #e4eef9; --accent-mid: #7aaad8; --text-main: #1e2c3a; --text-sub: #607080;
            --tag-bg: #ddeef8; --tag-text: #2a5a8a; --tag-border: #b0d4ee;
            --shadow: 0 4px 20px rgba(60,100,180,0.08);
        }
        :root[data-theme="mono"] {
            --bg: #2a2a2a; --card: #333333; --border: #444444; --accent: #aaaaaa;
            --accent-light: #3d3d3d; --accent-mid: #888888; --text-main: #e8e8e8; --text-sub: #888888;
            --tag-bg: #3d3d3d; --tag-text: #cccccc; --tag-border: #555555;
            --shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div id="logged-out-ui" style="padding: 8px 0;">
                <button onclick="signInWithGoogle()" class="btn-primary" style="background: none; color: var(--accent); border: 1.5px solid var(--border); box-shadow: none;">
                    Googleでログイン
                </button>
            </div>
            
            <div id="logged-in-ui" style="display: none; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border);">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div class="icon-wrap">
                        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    </div>
                    <div style="flex: 1;">
                        <div id="user-email" style="font-size: 0.9rem; font-weight: 500; color: var(--text-sub);"></div>
                        <button onclick="signOut()" class="btn-sub" style="margin-top: 8px;">ログアウト</button>
                    </div>
                </div>
            </div>

            <div style="margin-bottom: 20px;">
                <button class="btn-primary" onclick="window.location.reload();" style="background: none; color: var(--accent); border: 1.5px solid var(--border); box-shadow: none;">
                    最新の情報に更新
                </button>
            </div>

            <div class="card-header" style="margin-bottom:0;">
                <div class="card-title">
                    <div class="icon-wrap">
                        <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                    </div>
                    プッシュ通知
                </div>
                <label class="switch">
                    <input type="checkbox" id="push-switch">
                    <span class="slider"></span>
                </label>
            </div>
            <div id="status-text" class="status">状態を確認中…</div>
        </div>

        <div id="main-content" style="display: none; flex-direction: column; gap: var(--gap-main);">
            
            <a href="https://www.instagram.com/stories/jr_official_/" target="_blank" class="btn-insta">
                Instagramストーリーを開く
            </a>

            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <div class="icon-wrap">
                            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        </div>
                        監視キーワード
                    </div>
                </div>
                <div class="input-group">
                    <input type="text" id="keyword-input" placeholder="キーワードを追加…">
                    <button class="btn-add" onclick="addKeyword()">＋</button>
                </div>
                <div id="keywords-list"></div>
            </div>

            <div class="card" style="padding: 16px 24px;">
                <div class="card-header" style="margin-bottom: 0;">
                    <div class="card-title">
                        <div class="icon-wrap">
                            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a10 10 0 0 1 0 20"></path><path d="M12 2c2.5 2.5 4 5.5 4 10s-1.5 7.5-4 10"></path></svg>
                        </div>
                        カラー変更
                    </div>
                    <div class="theme-btn-group">
                        <button class="theme-btn active" id="btn-warm" onclick="setTheme('warm')">
                            <span class="theme-swatch swatch-warm"></span>
                        </button>
                        <button class="theme-btn" id="btn-cool" onclick="setTheme('cool')">
                            <span class="theme-swatch swatch-cool"></span>
                        </button>
                        <button class="theme-btn" id="btn-mono" onclick="setTheme('mono')">
                            <span class="theme-swatch swatch-mono"></span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <div class="icon-wrap">
                            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                        </div>
                        ストーリー画像
                    </div>
                </div>
                <div class="image-grid">
                    <div class="image-item"><img src="https://lh3.googleusercontent.com/d/1JlP_9aDbSkJSPI6JTtRXW5w4EHNGVkJH" alt="Latest 1"></div>
                    <div class="image-item"><img src="https://lh3.googleusercontent.com/d/1v-lvwJloxr61ddIkYlr4JJWOOU9W8EZ-" alt="Latest 2"></div>
                    <div class="image-item"><img src="https://lh3.googleusercontent.com/d/1N18SGdHE8kmZeflUyhGrtcvtPNSY5UGT" alt="Latest 3"></div>
                </div>
                <div style="border-top: 1px solid var(--border); padding-top: 20px;">
                    <div style="display:flex; align-items:center; gap:12px; margin-bottom:14px;">
                        <div class="icon-wrap">
                            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line></svg>
                        </div>
                        <span style="font-weight:600;">取得テキスト</span>
                    </div>
                    <div id="latest-analysis" class="log-content">読み込み中…</div>
                    <div id="update-time" class="status"></div>
                </div>
            </div>
        </div> 
    </div>

    <script>
        function setTheme(theme) {
            const root = document.documentElement;
            root.setAttribute('data-theme', theme === 'warm' ? '' : theme);
            ['warm','cool','mono'].forEach(t => {
                document.getElementById('btn-' + t).classList.toggle('active', t === theme);
            });
            localStorage.setItem('color-theme', theme);
        }
        (function() {
            const saved = localStorage.getItem('color-theme') || 'warm';
            if (saved !== 'warm') setTheme(saved);
        })();
    </script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  // GoogleAuthProvider と signInWithPopup を追加
  import { getAuth, onAuthStateChanged, signOut as firebaseSignOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
  import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy, limit, serverTimestamp, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
  import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-messaging.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBCwEb0nAynWlcIYloAwwdDQocXgD1W8DQ",
    authDomain: "user-cd2c1.firebaseapp.com",
    projectId: "user-cd2c1",
    storageBucket: "user-cd2c1.firebasestorage.app",
    messagingSenderId: "990277200920",
    appId: "1:990277200920:web:952d974484fa76ed89e76d",
    measurementId: "G-30QNZ04PDZ"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  let messaging;
  
  try {
      messaging = getMessaging(app);
      onMessage(messaging, (payload) => {
        if (Notification.permission === 'granted') {
          new Notification(payload.notification.title, {
            body: payload.notification.body,
            icon: '/icon-192.png'
          });
        }
      });
  } catch(e) {
      console.log("通知機能が現在無効です", e);
  }

  let currentUser = null;

// --- Googleログイン関数 ---
window.signInWithGoogle = async () => {
  const provider = new GoogleAuthProvider();
  
  // 💡 ここが重要：常にアカウント選択画面を出す設定
  provider.setCustomParameters({
    prompt: 'select_account'
  });

  try {
    // signInWithPopup を使用してログインを実行
    await signInWithPopup(auth, provider);
  } catch (error) {
    console.error("ログインエラー:", error);
    // ユーザーがポップアップを閉じた場合などのエラーハンドリング
    if (error.code !== 'auth/cancelled-popup-request') {
      alert("ログインに失敗しました: " + error.message);
    }
  }
};
    

  // 1. 認証状態の監視
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      document.getElementById('logged-out-ui').style.display = 'none';
      document.getElementById('logged-in-ui').style.display = 'block';
      document.getElementById('user-email').innerText = user.email;
      document.getElementById('main-content').style.display = 'flex';

      // 前回の修正：通知状況のチェック
      checkPushSubscription(user.uid);
      loadKeywords();
      loadLatestAnalysis();
    } else {
      // ログインしていない場合
      document.getElementById('logged-out-ui').style.display = 'block';
      document.getElementById('logged-in-ui').style.display = 'none';
      document.getElementById('main-content').style.display = 'none';
    }
  });

  // 通知設定の復元
  async function checkPushSubscription(uid) {
    const pushSwitch = document.getElementById('push-switch');
    const statusText = document.getElementById('status-text');
    try {
      const docRef = doc(db, 'subscriptions', uid);
      const docSnap = await getDoc(docRef);
      if (docSnap.exists()) {
        pushSwitch.checked = true;
        statusText.innerText = "通知設定：ON (準備完了)";
      } else {
        pushSwitch.checked = false;
        statusText.innerText = "通知設定：OFF";
      }
    } catch (error) {
      console.error("通知状態の確認失敗:", error);
    }
  }

// 2. ログアウト処理
  window.signOut = async () => {
    try {
      await firebaseSignOut(auth);
      window.location.href = 'index.html'; // index.htmlへ飛ばす
    } catch (error) {
      alert("ログアウトエラー: " + error.message);
    }
  };

  // 3. キーワードの読み込み
  function loadKeywords() {
    const q = query(collection(db, 'keywords'), orderBy('createdAt', 'desc'));
    onSnapshot(q, (snapshot) => {
      const list = document.getElementById('keywords-list');
      list.innerHTML = '';
      snapshot.forEach((docSnap) => {
        const data = docSnap.data();
        const el = document.createElement('div');
        el.className = 'keyword-tag';
        el.innerHTML = `${data.keyword} <button class="btn-del" onclick="deleteKeyword('${docSnap.id}')">×</button>`;
        list.appendChild(el);
      });
    });
  }

  // 4. キーワードの追加
  window.addKeyword = async () => {
    const input = document.getElementById('keyword-input');
    const kw = input.value.trim();
    if (!kw || !currentUser) return;
    try {
      await addDoc(collection(db, 'keywords'), {
        keyword: kw,
        user_id: currentUser.uid,
        createdAt: serverTimestamp()
      });
      input.value = '';
    } catch (error) {
      alert("追加に失敗しました");
    }
  };

  // 5. キーワードの削除
  window.deleteKeyword = async (id) => {
    try {
      await deleteDoc(doc(db, 'keywords', id));
    } catch (error) {
      alert("削除に失敗しました");
    }
  };

  // 6. 最新解析結果の読み込み
  function loadLatestAnalysis() {
    const q = query(collection(db, 'analysis_logs'), orderBy('updated_at', 'desc'), limit(1));
    onSnapshot(q, (snapshot) => {
      const latestEl = document.getElementById('latest-analysis');
      const timeEl = document.getElementById('update-time');
      if (!snapshot.empty) {
        const data = snapshot.docs[0].data();
        latestEl.innerText = data.content;
        const date = data.updated_at ? data.updated_at.toDate() : new Date();
        timeEl.innerText = "最終更新: " + date.toLocaleString('ja-JP');
      } else {
        latestEl.innerText = "データがありません";
      }
    });
  }

  // 7. プッシュ通知のスイッチ
  const pushSwitch = document.getElementById('push-switch');
  const statusText = document.getElementById('status-text');

  pushSwitch.addEventListener('change', async (e) => {
    if (!currentUser) return;
    if (e.target.checked) {
      statusText.innerText = "設定中...";
      try {
        const permission = await Notification.requestPermission();
        if (permission === 'granted') {
          const currentToken = await getToken(messaging, { 
            vapidKey: 'BFfTYmGpeE2ts6TGdboKiHvX7qlGkum04E1RkMrfSVmOryVGXFEDM8SC3OuAdvhoJRpzFpZu1S36XEin9weDzkQ' 
          });
          if (currentToken) {
            await setDoc(doc(db, 'subscriptions', currentUser.uid), {
              user_id: currentUser.uid,
              fcm_token: currentToken,
              updated_at: serverTimestamp()
            }, { merge: true });
            statusText.innerText = "通知設定：ON (準備完了)";
          }
        } else {
          statusText.innerText = "通知がブロックされています";
          e.target.checked = false;
        }
      } catch (err) {
        statusText.innerText = "エラーが発生しました";
        e.target.checked = false;
      }
    } else {
      try {
        await deleteDoc(doc(db, 'subscriptions', currentUser.uid));
        statusText.innerText = "通知設定：OFF";
      } catch (err) {
        console.error(err);
      }
    }
  });
</script>
</body>
</html>
