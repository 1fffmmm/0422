<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>監視コントロールパネル (Debug Mode)</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdf6ee;
            --card: #fffaf5;
            --border: #f0e4d0;
            --accent: #d97a4a;
            --accent-light: #faeee4;
            --accent-mid: #e8a07a;
            --text-main: #3a2c1e;
            --text-sub: #a08060;
            --tag-bg: #fdecd8;
            --tag-text: #a05a2a;
            --tag-border: #f5d4b0;
            --shadow: 0 2px 18px rgba(180,110,60,0.09);
            --shadow-hover: 0 6px 28px rgba(180,110,60,0.16);
            --insta: linear-gradient(135deg, #f9c784 0%, #f07167 42%, #d63384 78%, #9b59b6 100%);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 15% 0%, rgba(240,160,100,0.18) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 100%, rgba(249,200,140,0.15) 0%, transparent 55%);
            min-height: 100vh;
            padding: 32px 16px 56px;
            color: var(--text-main);
        }

        .container {
            max-width: 440px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .card {
            background: var(--card);
            border-radius: 22px;
            padding: 22px 22px 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: box-shadow 0.25s;
        }
        .card:hover { box-shadow: var(--shadow-hover); transform: translateY(-1px); }
        .card { transition: box-shadow 0.25s, transform 0.25s; }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
        }
        .card-title {
            display: flex;
            align-items: center;
            gap: 11px;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.01em;
            color: var(--text-main);
        }
        .icon-wrap {
            width: 34px; height: 34px;
            border-radius: 11px;
            background: var(--accent-light);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .icon-wrap svg {
            width: 17px; height: 17px;
            stroke: var(--accent);
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .btn-insta {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--insta);
            color: white;
            text-decoration: none;
            padding: 17px 20px;
            border-radius: 18px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.93rem;
            letter-spacing: 0.03em;
            box-shadow: 0 6px 22px rgba(214,51,132,0.22);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-insta:hover { transform: translateY(-1px); box-shadow: 0 8px 26px rgba(214,51,132,0.28); }

        .switch { position: relative; display: inline-block; width: 50px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; inset: 0;
            background: #e8d8c8; transition: .35s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: "";
            height: 20px; width: 20px; left: 4px; bottom: 4px;
            background: white; transition: .35s; border-radius: 50%;
            box-shadow: 0 1px 5px rgba(0,0,0,0.15);
        }
        input:checked + .slider { background: var(--accent); }
        input:checked + .slider:before { transform: translateX(22px); }

        .status { font-size: 0.77rem; color: var(--text-sub); margin-top: 10px; }

        .input-group { display: flex; gap: 8px; margin-bottom: 13px; }
        input[type="text"] {
            flex: 1; padding: 10px 14px;
            border: 1.5px solid var(--border); border-radius: 12px;
            font-family: 'Outfit', sans-serif; font-size: 0.9rem;
            color: var(--text-main); background: #fffdf9; outline: none;
        }

        .btn-add {
            background: var(--accent); color: white; border: none;
            padding: 0 17px; border-radius: 12px;
            font-family: 'Outfit', sans-serif; font-weight: 600;
            font-size: 1.3rem; cursor: pointer;
        }

        #keywords-list { display: flex; flex-wrap: wrap; gap: 7px; }

        .keyword-tag {
            display: inline-flex; align-items: center;
            background: var(--tag-bg); color: var(--tag-text);
            padding: 5px 13px; border-radius: 20px;
            font-size: 0.82rem; font-weight: 500;
            border: 1px solid var(--tag-border);
            animation: pop 0.2s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes pop { from { opacity:0; transform:scale(0.8); } to { opacity:1; transform:scale(1); } }

        .btn-del {
            margin-left: 8px; color: #d0a070; cursor: pointer;
            font-weight: 700; border: none; background: none;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, var(--accent-mid) 0%, var(--accent) 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 16px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.93rem;
            letter-spacing: 0.03em;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(217, 122, 74, 0.32);
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
            width: 100%;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(217, 122, 74, 0.38);
        }
        .btn-primary:active { transform: translateY(0); }

        .btn-sub {
            background: none;
            border: 1.5px solid var(--border);
            color: var(--text-sub);
            padding: 6px 14px;
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .btn-sub:hover { background: var(--accent-light); color: var(--accent); border-color: var(--accent-mid); }

        .log-content {
            background: #fdf0e4; color: #7a4020;
            padding: 14px 16px; border-radius: 13px;
            font-family: 'Courier New', monospace; font-size: 0.81rem;
            min-height: 56px; white-space: pre-wrap;
            border: 1.5px solid #f0d8b8;
        }
        
        /* ログ表示ボックスの改善 */
#latest-analysis {
    background: var(--accent-light);
    color: var(--text-main);
    padding: 15px;
    border-radius: 12px;
    font-size: 0.95rem;
    line-height: 1.6;
    border: 1px solid var(--border);
    white-space: pre-wrap; /* 改行を反映 */
    
    /* ここが重要：高さを制限してスクロール可能に */
    max-height: 300px; 
    overflow-y: auto;
}

/* Pull to Refresh用のインジケーター（通常は隠しておく） */
#pull-indicator {
    text-align: center;
    height: 0;
    overflow: hidden;
    transition: height 0.2s ease;
    color: var(--accent);
    font-size: 0.8rem;
    font-weight: bold;
}
        
   /* 画像カード用のスタイル */
.image-grid {
    display: flex;
    gap: 10px;
    overflow-x: auto; /* スマホで横に並びきらない場合にスクロール可能に */
    padding-bottom: 5px;
}

.image-item {
    flex: 1; /* 横幅を均等に */
    min-width: 100px; /* 最小サイズ */
    aspect-ratio: 1 / 1; /* 正方形に統一 */
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
}

.image-item img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* 枠いっぱいにトリミング表示 */
    display: block;
}
        
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div id="logged-out-ui" style="padding: 4px 0 16px;">
                <button onclick="signInWithGoogle()" class="btn-primary" style="background: none; color: var(--accent); box-shadow: none; border: 1.5px solid var(--border); gap: 8px; padding: 11px 20px;">
                    Googleでログイン
                </button>
            </div>
            
            <div id="logged-in-ui" style="display: none; margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--border);">
                <div style="display: flex; align-items: center; gap: 11px;">
                    <div class="icon-wrap">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    </div>
                    <div>
                        <div id="user-email" style="font-size: 0.85rem; font-weight: 500; color: var(--text-sub);"></div>
                        <button onclick="signOut()" class="btn-sub" style="margin-top: 6px;">ログアウト</button>
                    </div>
                </div>
            </div>

            <div style="margin-bottom: 14px;">
                <button class="btn-primary" onclick="window.location.reload();" style="background: none; color: var(--accent); box-shadow: none; border: 1.5px solid var(--border); gap: 8px; padding: 11px 20px;">
                    最新の情報に更新
                </button>
            </div>

            <div class="card-header" style="margin-bottom:0;">
                <div class="card-title">
                    <div class="icon-wrap">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                    </div>
                    プッシュ通知
                </div>
                <label class="switch">
                    <input type="checkbox" id="push-switch">
                    <span class="slider"></span>
                </label>
            </div>
            <div id="status-text" class="status">状態を確認中…</div>
        </div>

        <div id="main-content" style="display: none;">
            <a href="https://www.instagram.com/stories/jr_official_/" target="_blank" class="btn-insta" style="margin-bottom: 14px;">
                Instagramストーリーを開く
            </a>

            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <div class="icon-wrap">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        </div>
                        監視キーワード
                    </div>
                </div>
                <div class="input-group">
                    <input type="text" id="keyword-input" placeholder="新しいキーワードを入力…">
                    <button class="btn-add" onclick="addKeyword()">＋</button>
                </div>
                <div id="keywords-list"></div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <div class="icon-wrap">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                        </div>
                        ストーリー画像
                    </div>
                </div>
                <div class="image-grid" style="margin-bottom: 18px;">
                    <div class="image-item"><img src="https://lh3.googleusercontent.com/d/1JlP_9aDbSkJSPI6JTtRXW5w4EHNGVkJH" alt="Latest image 1"></div>
                    <div class="image-item"><img src="https://lh3.googleusercontent.com/d/1v-lvwJloxr61ddIkYlr4JJWOOU9W8EZ-" alt="Latest image 2"></div>
                    <div class="image-item"><img src="https://lh3.googleusercontent.com/d/1N18SGdHE8kmZeflUyhGrtcvtPNSY5UGT" alt="Latest image 3"></div>
                </div>
                <div style="border-top: 1px solid var(--border); padding-top: 16px;">
                    <div style="display:flex; align-items:center; gap:10px; margin-bottom:12px;">
                        <div class="icon-wrap">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                        </div>
                        <span style="font-size:0.95rem; font-weight:600; color:var(--text-main);">取得テキスト</span>
                    </div>
                    <div id="latest-analysis" class="log-content">読み込み中…</div>
                    <div id="update-time" class="status"></div>
                </div>
            </div>
        </div> </div> ```
  

  
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  // GoogleAuthProvider と signInWithPopup を追加
  import { getAuth, onAuthStateChanged, signOut as firebaseSignOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
  import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy, limit, serverTimestamp, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
  import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-messaging.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBCwEb0nAynWlcIYloAwwdDQocXgD1W8DQ",
    authDomain: "user-cd2c1.firebaseapp.com",
    projectId: "user-cd2c1",
    storageBucket: "user-cd2c1.firebasestorage.app",
    messagingSenderId: "990277200920",
    appId: "1:990277200920:web:952d974484fa76ed89e76d",
    measurementId: "G-30QNZ04PDZ"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  let messaging;
  
  try {
      messaging = getMessaging(app);
      onMessage(messaging, (payload) => {
        if (Notification.permission === 'granted') {
          new Notification(payload.notification.title, {
            body: payload.notification.body,
            icon: '/icon-192.png'
          });
        }
      });
  } catch(e) {
      console.log("通知機能が現在無効です", e);
  }

  let currentUser = null;

// --- Googleログイン関数 ---
window.signInWithGoogle = async () => {
  const provider = new GoogleAuthProvider();
  
  // 💡 ここが重要：常にアカウント選択画面を出す設定
  provider.setCustomParameters({
    prompt: 'select_account'
  });

  try {
    // signInWithPopup を使用してログインを実行
    await signInWithPopup(auth, provider);
  } catch (error) {
    console.error("ログインエラー:", error);
    // ユーザーがポップアップを閉じた場合などのエラーハンドリング
    if (error.code !== 'auth/cancelled-popup-request') {
      alert("ログインに失敗しました: " + error.message);
    }
  }
};
    

  // 1. 認証状態の監視
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      document.getElementById('logged-out-ui').style.display = 'none';
      document.getElementById('logged-in-ui').style.display = 'block';
      document.getElementById('user-email').innerText = user.email;
      document.getElementById('main-content').style.display = 'block';

      // 前回の修正：通知状況のチェック
      checkPushSubscription(user.uid);
      loadKeywords();
      loadLatestAnalysis();
    } else {
      // ログインしていない場合
      document.getElementById('logged-out-ui').style.display = 'block';
      document.getElementById('logged-in-ui').style.display = 'none';
      document.getElementById('main-content').style.display = 'none';
    }
  });

  // 通知設定の復元
  async function checkPushSubscription(uid) {
    const pushSwitch = document.getElementById('push-switch');
    const statusText = document.getElementById('status-text');
    try {
      const docRef = doc(db, 'subscriptions', uid);
      const docSnap = await getDoc(docRef);
      if (docSnap.exists()) {
        pushSwitch.checked = true;
        statusText.innerText = "通知設定：ON (準備完了)";
      } else {
        pushSwitch.checked = false;
        statusText.innerText = "通知設定：OFF";
      }
    } catch (error) {
      console.error("通知状態の確認失敗:", error);
    }
  }

// 2. ログアウト処理
  window.signOut = async () => {
    try {
      await firebaseSignOut(auth);
      window.location.href = 'index.html'; // index.htmlへ飛ばす
    } catch (error) {
      alert("ログアウトエラー: " + error.message);
    }
  };

  // 3. キーワードの読み込み
  function loadKeywords() {
    const q = query(collection(db, 'keywords'), orderBy('createdAt', 'desc'));
    onSnapshot(q, (snapshot) => {
      const list = document.getElementById('keywords-list');
      list.innerHTML = '';
      snapshot.forEach((docSnap) => {
        const data = docSnap.data();
        const el = document.createElement('div');
        el.className = 'keyword-tag';
        el.innerHTML = `${data.keyword} <button class="btn-del" onclick="deleteKeyword('${docSnap.id}')">×</button>`;
        list.appendChild(el);
      });
    });
  }

  // 4. キーワードの追加
  window.addKeyword = async () => {
    const input = document.getElementById('keyword-input');
    const kw = input.value.trim();
    if (!kw || !currentUser) return;
    try {
      await addDoc(collection(db, 'keywords'), {
        keyword: kw,
        user_id: currentUser.uid,
        createdAt: serverTimestamp()
      });
      input.value = '';
    } catch (error) {
      alert("追加に失敗しました");
    }
  };

  // 5. キーワードの削除
  window.deleteKeyword = async (id) => {
    try {
      await deleteDoc(doc(db, 'keywords', id));
    } catch (error) {
      alert("削除に失敗しました");
    }
  };

  // 6. 最新解析結果の読み込み
  function loadLatestAnalysis() {
    const q = query(collection(db, 'analysis_logs'), orderBy('updated_at', 'desc'), limit(1));
    onSnapshot(q, (snapshot) => {
      const latestEl = document.getElementById('latest-analysis');
      const timeEl = document.getElementById('update-time');
      if (!snapshot.empty) {
        const data = snapshot.docs[0].data();
        latestEl.innerText = data.content;
        const date = data.updated_at ? data.updated_at.toDate() : new Date();
        timeEl.innerText = "最終更新: " + date.toLocaleString('ja-JP');
      } else {
        latestEl.innerText = "データがありません";
      }
    });
  }

  // 7. プッシュ通知のスイッチ
  const pushSwitch = document.getElementById('push-switch');
  const statusText = document.getElementById('status-text');

  pushSwitch.addEventListener('change', async (e) => {
    if (!currentUser) return;
    if (e.target.checked) {
      statusText.innerText = "設定中...";
      try {
        const permission = await Notification.requestPermission();
        if (permission === 'granted') {
          const currentToken = await getToken(messaging, { 
            vapidKey: 'BFfTYmGpeE2ts6TGdboKiHvX7qlGkum04E1RkMrfSVmOryVGXFEDM8SC3OuAdvhoJRpzFpZu1S36XEin9weDzkQ' 
          });
          if (currentToken) {
            await setDoc(doc(db, 'subscriptions', currentUser.uid), {
              user_id: currentUser.uid,
              fcm_token: currentToken,
              updated_at: serverTimestamp()
            }, { merge: true });
            statusText.innerText = "通知設定：ON (準備完了)";
          }
        } else {
          statusText.innerText = "通知がブロックされています";
          e.target.checked = false;
        }
      } catch (err) {
        statusText.innerText = "エラーが発生しました";
        e.target.checked = false;
      }
    } else {
      try {
        await deleteDoc(doc(db, 'subscriptions', currentUser.uid));
        statusText.innerText = "通知設定：OFF";
      } catch (err) {
        console.error(err);
      }
    }
  });
</script>
</body>
</html>
