<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>監視コントロールパネル (Debug Mode)</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        /* ===== テーマ定義 ===== */
        :root {
            --bg: #fdf6ee;
            --card: #fffaf5;
            --border: #f0e4d0;
            --accent: #d97a4a;
            --accent-light: #faeee4;
            --accent-mid: #e8a07a;
            --text-main: #3a2c1e;
            --text-sub: #a08060;
            --tag-bg: #fdecd8;
            --tag-text: #a05a2a;
            --tag-border: #f5d4b0;
            --shadow: 0 2px 18px rgba(180,110,60,0.09);
            --shadow-hover: 0 6px 28px rgba(180,110,60,0.16);
            --insta: linear-gradient(135deg, #f9c784 0%, #f07167 42%, #d63384 78%, #9b59b6 100%);
            --bg-gradient-1: rgba(240,160,100,0.18);
            --bg-gradient-2: rgba(249,200,140,0.15);
        }

        /* Cool テーマ */
        :root.theme-cool {
            --bg: #eef4fb;
            --card: #f5f9ff;
            --border: #cde0f5;
            --accent: #4a7fc1;
            --accent-light: #ddeeff;
            --accent-mid: #7aaae0;
            --text-main: #1a2c3e;
            --text-sub: #6080a0;
            --tag-bg: #dceeff;
            --tag-text: #2a5a9a;
            --tag-border: #b0d4f5;
            --shadow: 0 2px 18px rgba(60,110,180,0.09);
            --shadow-hover: 0 6px 28px rgba(60,110,180,0.16);
            --bg-gradient-1: rgba(100,160,240,0.15);
            --bg-gradient-2: rgba(140,200,249,0.12);
        }

        /* Mono テーマ */
        :root.theme-mono {
            --bg: #2a2a2a;
            --card: #333333;
            --border: #444444;
            --accent: #aaaaaa;
            --accent-light: #3d3d3d;
            --accent-mid: #888888;
            --text-main: #e8e8e8;
            --text-sub: #888888;
            --tag-bg: #3d3d3d;
            --tag-text: #cccccc;
            --tag-border: #555555;
            --shadow: 0 2px 18px rgba(0,0,0,0.3);
            --shadow-hover: 0 6px 28px rgba(0,0,0,0.4);
            --insta: linear-gradient(135deg, #555 0%, #444 42%, #333 78%, #222 100%);
            --bg-gradient-1: rgba(255,255,255,0.03);
            --bg-gradient-2: rgba(255,255,255,0.02);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* ① 拡大縮小禁止・横幅自動・縦スクロールのみ */
        html {
            overflow-x: hidden;
            overflow-y: scroll;
            touch-action: pan-y;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 15% 0%, var(--bg-gradient-1) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 100%, var(--bg-gradient-2) 0%, transparent 55%);
            min-height: 100vh;
            padding: 32px 16px 56px;
            color: var(--text-main);
            width: 100%;
            overflow-x: hidden;
            touch-action: pan-y;
        }

        .container {
            max-width: 440px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .card {
            background: var(--card);
            border-radius: 22px;
            padding: 22px 22px 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: box-shadow 0.25s, transform 0.25s;
        }
        .card:hover { box-shadow: var(--shadow-hover); transform: translateY(-1px); }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
        }
        .card-title {
            display: flex;
            align-items: center;
            gap: 11px;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.01em;
            color: var(--text-main);
        }
        .icon-wrap {
            width: 34px; height: 34px;
            border-radius: 11px;
            background: var(--accent-light);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .icon-wrap svg {
            width: 17px; height: 17px;
            stroke: var(--accent);
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .btn-insta {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--insta);
            color: white;
            text-decoration: none;
            padding: 17px 20px;
            border-radius: 18px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.93rem;
            letter-spacing: 0.03em;
            box-shadow: 0 6px 22px rgba(214,51,132,0.22);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-insta:hover { transform: translateY(-1px); box-shadow: 0 8px 26px rgba(214,51,132,0.28); }

        .switch { position: relative; display: inline-block; width: 50px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; inset: 0;
            background: #e8d8c8; transition: .35s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: "";
            height: 20px; width: 20px; left: 4px; bottom: 4px;
            background: white; transition: .35s; border-radius: 50%;
            box-shadow: 0 1px 5px rgba(0,0,0,0.15);
        }
        input:checked + .slider { background: var(--accent); }
        input:checked + .slider:before { transform: translateX(22px); }

        :root.theme-mono .slider { background: #555; }

        .status { font-size: 0.77rem; color: var(--text-sub); margin-top: 10px; }

        .input-group { display: flex; gap: 8px; margin-bottom: 13px; }
        input[type="text"] {
            flex: 1; padding: 10px 14px;
            border: 1.5px solid var(--border); border-radius: 12px;
            font-family: 'Outfit', sans-serif; font-size: 0.9rem;
            color: var(--text-main); background: var(--card); outline: none;
        }

        .btn-add {
            background: var(--accent); color: white; border: none;
            padding: 0 17px; border-radius: 12px;
            font-family: 'Outfit', sans-serif; font-weight: 600;
            font-size: 1.3rem; cursor: pointer;
        }

        #keywords-list { display: flex; flex-wrap: wrap; gap: 7px; }

        .keyword-tag {
            display: inline-flex; align-items: center;
            background: var(--tag-bg); color: var(--tag-text);
            padding: 5px 13px; border-radius: 20px;
            font-size: 0.82rem; font-weight: 500;
            border: 1px solid var(--tag-border);
            animation: pop 0.2s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes pop { from { opacity:0; transform:scale(0.8); } to { opacity:1; transform:scale(1); } }

        .btn-del {
            margin-left: 8px; color: #d0a070; cursor: pointer;
            font-weight: 700; border: none; background: none;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, var(--accent-mid) 0%, var(--accent) 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 16px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.93rem;
            letter-spacing: 0.03em;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(217, 122, 74, 0.32);
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
            width: 100%;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(217, 122, 74, 0.38);
        }
        .btn-primary:active { transform: translateY(0); }

        .btn-sub {
            background: none;
            border: 1.5px solid var(--border);
            color: var(--text-sub);
            padding: 6px 14px;
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .btn-sub:hover { background: var(--accent-light); color: var(--accent); border-color: var(--accent-mid); }

        .log-content {
            background: var(--accent-light);
            color: var(--text-main);
            padding: 14px 16px; border-radius: 13px;
            font-family: 'Courier New', monospace; font-size: 0.81rem;
            min-height: 56px; white-space: pre-wrap;
            border: 1.5px solid var(--border);
        }

        /* ④ 取得テキストフレームのアニメーションを抑制 */
        #latest-analysis {
            background: var(--accent-light);
            color: var(--text-main);
            padding: 15px;
            border-radius: 12px;
            font-size: 0.9rem;
            line-height: 1.6;
            border: 1px solid var(--border);
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
            transition: none;
            animation: none;
        }

        /* Pull to Refresh */
        #pull-indicator {
            text-align: center;
            height: 0;
            overflow: hidden;
            transition: height 0.2s ease;
            color: var(--accent);
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* 画像カード */
        .image-grid {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        .image-item {
            flex: 1;
            min-width: 100px;
            aspect-ratio: 1 / 1;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .image-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ② カラー変更カード */
        .theme-btn-group {
            display: flex;
            gap: 8px;
        }
        .theme-btn {
            flex: 1;
            padding: 10px 8px;
            border-radius: 14px;
            border: 2px solid var(--border);
            background: var(--card);
            color: var(--text-sub);
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .theme-btn:hover {
            border-color: var(--accent-mid);
            color: var(--accent);
            background: var(--accent-light);
        }
        .theme-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-light);
        }
        .theme-swatch {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid rgba(0,0,0,0.08);
        }
        .swatch-warm { background: linear-gradient(135deg, #fdf6ee, #d97a4a); }
        .swatch-cool { background: linear-gradient(135deg, #eef4fb, #4a7fc1); }
        .swatch-mono { background: linear-gradient(135deg, #555, #2a2a2a); }

        /* ③ 通知リンクボタン */
        .btn-notice-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px 16px;
            margin-top: 14px;
            border-radius: 14px;
            border: 1.5px solid var(--border);
            background: none;
            color: var(--text-sub);
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-notice-link:hover {
            background: var(--accent-light);
            color: var(--accent);
            border-color: var(--accent-mid);
        }
        .btn-notice-link svg {
            width: 15px; height: 15px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            flex-shrink: 0;
        }

        /* ===== サブページ（通知が来ないときは？） ===== */
        #page-main, #page-notice { }
        #page-notice { display: none; }

        .page-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 4px;
        }
        .btn-back {
            display: flex;
            align-items: center;
            gap: 6px;
            background: none;
            border: 1.5px solid var(--border);
            color: var(--text-sub);
            padding: 8px 14px;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .btn-back:hover {
            background: var(--accent-light);
            color: var(--accent);
            border-color: var(--accent-mid);
        }
        .btn-back svg {
            width: 14px; height: 14px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2.2;
        }
        .page-title-text {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .notice-desc {
            font-size: 0.82rem;
            color: var(--text-sub);
            line-height: 1.65;
            margin-top: 10px;
            padding: 12px 14px;
            background: var(--accent-light);
            border-radius: 12px;
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <!-- メインページ -->
    <div id="page-main" class="container">

        <div class="card">
            <div id="logged-out-ui" style="padding: 4px 0 16px;">
                <button onclick="signInWithGoogle()" class="btn-primary" style="background: none; color: var(--accent); box-shadow: none; border: 1.5px solid var(--border); gap: 8px; padding: 11px 20px;">
                    Googleでログイン
                </button>
            </div>

            <div id="logged-in-ui" style="display: none; margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--border);">
                <div style="display: flex; align-items: center; gap: 11px;">
                    <div class="icon-wrap">
                        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    </div>
                    <div>
                        <div id="user-email" style="font-size: 0.85rem; font-weight: 500; color: var(--text-sub);"></div>
                        <button onclick="signOut()" class="btn-sub" style="margin-top: 6px;">ログアウト</button>
                    </div>
                </div>
            </div>

            <div style="margin-bottom: 14px;">
                <button class="btn-primary" onclick="window.location.reload();" style="background: none; color: var(--accent); box-shadow: none; border: 1.5px solid var(--border); gap: 8px; padding: 11px 20px;">
                    最新の情報に更新
                </button>
            </div>

            <div class="card-header" style="margin-bottom:0;">
                <div class="card-title">
                    <div class="icon-wrap">
                        <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                    </div>
                    プッシュ通知
                </div>
                <label class="switch">
                    <input type="checkbox" id="push-switch">
                    <span class="slider"></span>
                </label>
            </div>
            <div id="status-text" class="status">状態を確認中…</div>
        </div>

        <div id="main-content" style="display: none;">
            <a href="https://www.instagram.com/stories/jr_official_/" target="_blank" class="btn-insta" style="margin-bottom: 14px;">
                Instagramストーリーを開く
            </a>

            <!-- 監視キーワード -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <div class="icon-wrap">
                            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        </div>
                        監視キーワード
                    </div>
                </div>
                <div class="input-group">
                    <input type="text" id="keyword-input" placeholder="新しいキーワードを入力…">
                    <button class="btn-add" onclick="addKeyword()">＋</button>
                </div>
                <div id="keywords-list"></div>

                <!-- ③ 通知が来ないときは？リンク -->
                <button class="btn-notice-link" onclick="showPage('notice')">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                    通知が来ないときは？
                </button>
            </div>

            <!-- ② カラー変更カード -->
            <div class="card">
                <div class="card-header" style="margin-bottom: 16px;">
                    <div class="card-title">
                        <div class="icon-wrap">
                            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a10 10 0 0 1 0 20"></path><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"></path></svg>
                        </div>
                        カラー変更
                    </div>
                </div>
                <div class="theme-btn-group">
                    <button class="theme-btn active" id="theme-warm" onclick="setTheme('warm')">
                        <span class="theme-swatch swatch-warm"></span>
                        Warm
                    </button>
                    <button class="theme-btn" id="theme-cool" onclick="setTheme('cool')">
                        <span class="theme-swatch swatch-cool"></span>
                        Cool
                    </button>
                    <button class="theme-btn" id="theme-mono" onclick="setTheme('mono')">
                        <span class="theme-swatch swatch-mono"></span>
                        Mono
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- ③ サブページ：通知が来ないときは？ -->
    <div id="page-notice" class="container">
        <div style="margin-bottom: 4px;">
            <div class="page-header">
                <button class="btn-back" onclick="showPage('main')">
                    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
                    もどる
                </button>
                <span class="page-title-text">通知が来ないときは？</span>
            </div>
        </div>

        <!-- ストーリー画像カード -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">
                    <div class="icon-wrap">
                        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                    </div>
                    ストーリー画像
                </div>
            </div>
            <div class="image-grid" style="margin-bottom: 18px;">
                <div class="image-item"><img src="https://lh3.googleusercontent.com/d/1JlP_9aDbSkJSPI6JTtRXW5w4EHNGVkJH" alt="Latest image 1"></div>
                <div class="image-item"><img src="https://lh3.googleusercontent.com/d/1v-lvwJloxr61ddIkYlr4JJWOOU9W8EZ-" alt="Latest image 2"></div>
                <div class="image-item"><img src="https://lh3.googleusercontent.com/d/1N18SGdHE8kmZeflUyhGrtcvtPNSY5UGT" alt="Latest image 3"></div>
            </div>

            <!-- テキストセクション -->
            <div style="border-top: 1px solid var(--border); padding-top: 16px;">
                <div style="display:flex; align-items:center; gap:10px; margin-bottom:12px;">
                    <div class="icon-wrap">
                        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    </div>
                    <span style="font-size:0.95rem; font-weight:600; color:var(--text-main);">テキスト</span>
                </div>
                <!-- ④ アニメーション抑制済みの取得テキスト表示 -->
                <div id="latest-analysis" class="log-content">読み込み中…</div>
                <div id="update-time" class="status"></div>

                <!-- 説明文 -->
                <p class="notice-desc">
                    ストーリー内で文字が小さい場合やエフェクトが使用されている場合正しく認識されずキーワードが反応しません。テキストを確認し、文字化けしている場合はその表記をキーワードとして登録することをおすすめします。
                </p>
            </div>
        </div>
    </div>

<script type="module">

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

      onMessage(messaging, (payload) => {

      });
  } catch(e) {
      console.log("通知機能が現在無効です", e);
  }

  let currentUser = null;

  // ページ切り替え
  window.showPage = (page) => {
    document.getElementById('page-main').style.display = page === 'main' ? '' : 'none';
    document.getElementById('page-notice').style.display = page === 'notice' ? '' : 'none';
    window.scrollTo(0, 0);
  };

  // ② テーマ切り替え
  window.setTheme = (theme) => {
    const root = document.documentElement;
    root.classList.remove('theme-cool', 'theme-mono');
    if (theme === 'cool') root.classList.add('theme-cool');
    if (theme === 'mono') root.classList.add('theme-mono');
    localStorage.setItem('color-theme', theme);
    // ボタンのactive状態を更新
    ['warm','cool','mono'].forEach(t => {
      document.getElementById('theme-' + t).classList.toggle('active', t === theme);
    });
  };

  // テーマ復元
  const savedTheme = localStorage.getItem('color-theme') || 'warm';
  window.setTheme(savedTheme);

  // Googleログイン
  window.signInWithGoogle = async () => {
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });
    try {
      await signInWithPopup(auth, provider);
    } catch (error) {
      console.error("ログインエラー:", error);
      if (error.code !== 'auth/cancelled-popup-request') {
        alert("ログインに失敗しました: " + error.message);
      }
    }
  };

  // 認証状態の監視
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      document.getElementById('logged-out-ui').style.display = 'none';
      document.getElementById('logged-in-ui').style.display = 'block';
      document.getElementById('user-email').innerText = user.email;
      document.getElementById('main-content').style.display = 'block';
      checkPushSubscription(user.uid);
      loadKeywords();
      loadLatestAnalysis();
    } else {
      document.getElementById('logged-out-ui').style.display = 'block';
      document.getElementById('logged-in-ui').style.display = 'none';
      document.getElementById('main-content').style.display = 'none';
    }
  });

  async function checkPushSubscription(uid) {
    const pushSwitch = document.getElementById('push-switch');
    const statusText = document.getElementById('status-text');
    try {
      const docRef = doc(db, 'subscriptions', uid);
      const docSnap = await getDoc(docRef);
      if (docSnap.exists()) {
        pushSwitch.checked = true;
        statusText.innerText = "通知設定：ON (準備完了)";
      } else {
        pushSwitch.checked = false;
        statusText.innerText = "通知設定：OFF";
      }
    } catch (error) {
      console.error("通知状態の確認失敗:", error);
    }
  }

  window.signOut = async () => {
    try {
      await firebaseSignOut(auth);
      window.location.href = 'index.html';
    } catch (error) {
      alert("ログアウトエラー: " + error.message);
    }
  };

  function loadKeywords() {
    const q = query(collection(db, 'keywords'), orderBy('createdAt', 'desc'));
    onSnapshot(q, (snapshot) => {
      const list = document.getElementById('keywords-list');
      list.innerHTML = '';
      snapshot.forEach((docSnap) => {
        const data = docSnap.data();
        const el = document.createElement('div');
        el.className = 'keyword-tag';
        el.innerHTML = `${data.keyword} <button class="btn-del" onclick="deleteKeyword('${docSnap.id}')">×</button>`;
        list.appendChild(el);
      });
    });
  }

  window.addKeyword = async () => {
    const input = document.getElementById('keyword-input');
    const kw = input.value.trim();
    if (!kw || !currentUser) return;
    try {
      await addDoc(collection(db, 'keywords'), {
        keyword: kw,
        user_id: currentUser.uid,
        createdAt: serverTimestamp()
      });
      input.value = '';
    } catch (error) {
      alert("追加に失敗しました");
    }
  };

  window.deleteKeyword = async (id) => {
    try {
      await deleteDoc(doc(db, 'keywords', id));
    } catch (error) {
      alert("削除に失敗しました");
    }
  };

  function loadLatestAnalysis() {
    const q = query(collection(db, 'analysis_logs'), orderBy('updated_at', 'desc'), limit(1));
    onSnapshot(q, (snapshot) => {
      const latestEl = document.getElementById('latest-analysis');
      const timeEl = document.getElementById('update-time');
      if (!snapshot.empty) {
        const data = snapshot.docs[0].data();
        latestEl.innerText = data.content;
        const date = data.updated_at ? data.updated_at.toDate() : new Date();
        timeEl.innerText = "最終更新: " + date.toLocaleString('ja-JP');
      } else {
        latestEl.innerText = "データがありません";
      }
    });
  }

  const pushSwitch = document.getElementById('push-switch');
  const statusText = document.getElementById('status-text');

  pushSwitch.addEventListener('change', async (e) => {
    if (!currentUser) return;
    if (e.target.checked) {
      statusText.innerText = "設定中...";
      try {
        const permission = await Notification.requestPermission();
        if (permission === 'granted') {
          const currentToken = await getToken(messaging, {
            vapidKey: 'BFfTYmGpeE2ts6TGdboKiHvX7qlGkum04E1RkMrfSVmOryVGXFEDM8SC3OuAdvhoJRpzFpZu1S36XEin9weDzkQ'
          });
          if (currentToken) {
            await setDoc(doc(db, 'subscriptions', currentUser.uid), {
              user_id: currentUser.uid,
              fcm_token: currentToken,
              updated_at: serverTimestamp()
            }, { merge: true });
            statusText.innerText = "通知設定：ON (準備完了)";
          }
        } else {
          statusText.innerText = "通知がブロックされています";
          e.target.checked = false;
        }
      } catch (err) {
        statusText.innerText = "エラーが発生しました";
        e.target.checked = false;
      }
    } else {
      try {
        await deleteDoc(doc(db, 'subscriptions', currentUser.uid));
        statusText.innerText = "通知設定：OFF";
      } catch (err) {
        console.error(err);
      }
    }
  });
</script>
</body>
</html>
