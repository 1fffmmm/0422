<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通知設定</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #2196F3; }
        input:checked + .slider:before { transform: translateX(26px); }
        .status { margin-top: 1rem; font-size: 0.9rem; color: #666; }
    </style>
</head>
<body>

<div class="card">
    <h2>プッシュ通知設定</h2>
    <label class="switch">
        <input type="checkbox" id="push-switch">
        <span class="slider"></span>
    </label>
    <div id="status-text" class="status">状態を確認中...</div>
</div>

<script>
    // --- 設定 ---
    const SUPABASE_URL = 'https://ltqqmclfgdxtasvtirtf.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_iPDG85-2s9n0TBw-kVs55g_xC3ZSt-H';
    const VAPID_PUBLIC_KEY = 'BPjCNf2epwHU2U_a4X6d2zEfDzqRvmFYmXJrY2zUMR-h62JZG8bJ2Y5sXr0VaZp_XSaUkn0p3TH3X0_SCoD9p5A';

    // 変数名を supabaseClient に変更（ライブラリとの衝突回避）
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    const pushSwitch = document.getElementById('push-switch');
    const statusText = document.getElementById('status-text');

    // 1. ページ読み込み時に購読状態を確認
    async function checkSubscription() {
        if (!('serviceWorker' in navigator)) {
            statusText.innerText = "このブラウザは通知に対応していません";
            return;
        }
        try {
            const registration = await navigator.serviceWorker.ready;
            const subscription = await registration.pushManager.getSubscription();
            pushSwitch.checked = !!subscription;
            statusText.innerText = subscription ? "通知は有効です" : "通知は無効です";
        } catch (err) {
            console.error("初期チェックエラー:", err);
        }
    }

    // 2. 通知をオンにする
    async function subscribeUser() {
        alert("1: 処理を開始しました");
        try {
            const registration = await navigator.serviceWorker.ready;
            alert("2: Service Workerの準備完了");

            const subscription = await registration.pushManager.subscribe({
                userVisibleOnly: true,
                applicationServerKey: VAPID_PUBLIC_KEY
            });
            alert("3: ブラウザの購読成功！");

            // Supabaseへ保存
            const { error } = await supabaseClient
                .from('subscriptions')
                .upsert({ 
                    endpoint: subscription.endpoint, 
                    subscription_json: JSON.parse(JSON.stringify(subscription)) 
                }, { onConflict: 'endpoint' });

            if (error) throw error;
            
            statusText.innerText = "通知をオンにしました！";
            alert("4: Supabaseへの保存完了！");
        } catch (err) {
            console.error(err);
            alert("エラー発生: " + err.message);
            statusText.innerText = "エラー: " + err.message;
            pushSwitch.checked = false;
        }
    }

    // 3. 通知をオフにする
    async function unsubscribeUser() {
        try {
            const registration = await navigator.serviceWorker.ready;
            const subscription = await registration.pushManager.getSubscription();
            
            if (subscription) {
                await supabaseClient
                    .from('subscriptions')
                    .delete()
                    .eq('endpoint', subscription.endpoint);
                
                await subscription.unsubscribe();
            }
            statusText.innerText = "通知をオフにしました";
            alert("通知を解除しました");
        } catch (err) {
            alert("解除エラー: " + err.message);
        }
    }

    // イベントリスナー
    pushSwitch.addEventListener('change', () => {
        if (pushSwitch.checked) {
            subscribeUser();
        } else {
            unsubscribeUser();
        }
    });

    // サービスワーカー登録
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(() => {
                    console.log("Service Worker registered");
                    checkSubscription();
                })
                .catch(err => console.error("SW Registration Error:", err));
        });
    }
</script>
</body>
</html>
