<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サービス紹介 — Instagram ストーリー監視パネル</title>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // 【重要】新しいFirebaseプロジェクトの設定をここに貼る
    const firebaseConfig = {
        apiKey: "AIzaSyBCwEb0nAynWlcIYloAwwdDQocXgD1W8DQ",
  authDomain: "user-cd2c1.firebaseapp.com",
  projectId: "user-cd2c1",
  storageBucket: "user-cd2c1.firebasestorage.app",
  messagingSenderId: "990277200920",
  appId: "1:990277200920:web:952d974484fa76ed89e76d",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // ログイン済みならメイン画面へ
    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = 'main.html';
    });

    window.signInWithGoogle = async () => {
      try {
        await signInWithPopup(auth, provider);
      } catch (error) {
        console.error("Login failed", error);
        alert("ログインに失敗しました");
      }
    };
  </script>
  </head>
<body>
  <div id="login-container">
    <button id="btn-login" onclick="signInWithGoogle()">Googleでログイン</button>
  </div>
</body>
</html>
