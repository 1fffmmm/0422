<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通知モニター</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }

        .insta-btn { background: #e1306c; text-decoration: none; display: block; color: white; padding: 10px; border-radius: 5px; text-align: center; margin-top: 10px; }

</head>
<body>

    <h2>通知モニター設定</h2>

    <div class="card">
        <h3>Step 1: 通知を有効にする</h3>
        <p>「ホーム画面に追加」した状態で押してください。</p>
        <button id="subscribe-btn">通知を許可する</button>
    </div>

    <div class="card">
        <h3>Step 2: 宛先情報 (JSON)</h3>
        <p>ボタンを押して成功すると、ここに住所が表示されます。これをコピーしてSupabaseに保存してください。</p>
        <pre id="subscription-output">まだ購読されていません</pre>
    </div>

    <div class="card">
        <h3>リンク</h3>
        <a href="https://www.instagram.com/stories/jr_official_/" target="_blank" class="insta-btn">Instagramストーリーを開く</a>
    </div>

        // Base64変換用関数
        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) {
                outputArray[i] = rawData.charCodeAt(i);
            }
            return outputArray;
        }

        // サービスワーカーの登録
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(reg => {
                    console.log('SW registered', reg);
                }).catch(err => {
                    console.error('SW registration failed', err);
                });
            });
        }

        // 通知購読処理
        document.getElementById('subscribe-btn').addEventListener('click', async () => {
            try {
                const permission = await Notification.requestPermission();
                if (permission !== 'granted') {
                    alert('通知が拒否されました。設定アプリから通知を許可してください。');
                    return;
                }

                const registration = await navigator.serviceWorker.ready;
                const subscription = await registration.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: urlBase64ToUint8Array(PUBLIC_VAPID_KEY)
                });

                // JSON文字列に変換
                const subJson = JSON.stringify(subscription);
                
                // 画面に表示
                document.getElementById('subscription-output').innerText = subJson;
