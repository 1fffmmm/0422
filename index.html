<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サービス紹介 — Instagram ストーリー監視パネル</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fdf6ee; --card: #fffaf5; --border: #f0e4d0; --accent: #d97a4a;
      --accent-light: #faeee4; --accent-mid: #e8a07a; --text-main: #3a2c1e;
      --text-sub: #a08060; --shadow: 0 2px 18px rgba(180,110,60,0.08);
    }
    body { background: var(--bg); color: var(--text-main); font-family: 'Outfit', 'Noto Sans JP', sans-serif; margin: 0; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; }
    .hero { text-align: center; padding: 40px 0; }
    .hero h1 { font-family: 'DM Serif Display', serif; font-size: 2.5rem; margin-bottom: 10px; }
    .btn-login { background: var(--accent); color: white; border: none; padding: 15px 30px; border-radius: 50px; font-weight: 600; cursor: pointer; width: 100%; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(217,122,74,0.3); transition: 0.3s; }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(217,122,74,0.4); }
    .status { text-align: center; margin-top: 15px; font-size: 0.9rem; color: var(--text-sub); }
    .steps { margin-top: 50px; background: var(--card); padding: 30px; border-radius: 24px; border: 1px solid var(--border); }
    .step { display: flex; gap: 20px; margin-bottom: 25px; }
    .step-num { background: var(--accent-light); color: var(--accent); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }
    .step-title { font-weight: 600; margin-bottom: 4px; }
    .step-desc { font-size: 0.9rem; color: var(--text-sub); line-height: 1.5; }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>Instagram<br>Monitoring</h1>
      <p style="color: var(--text-sub);">ストーリーを自動監視し、推しの更新を逃さない。</p>
    </div>

    <button id="btn-login" class="btn-login" onclick="signInWithGoogle()">Googleでログインして始める</button>
    <div id="login-status" class="status"></div>

    <div class="steps">
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-body">
          <div class="step-title">Googleログイン</div>
          <div class="step-desc">お持ちのGoogleアカウントで簡単に登録できます。</div>
        </div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-body">
          <div class="step-title">通知の許可</div>
          <div class="step-desc">ログイン後、通知設定をオンにしてブラウザの許可を出してください。</div>
        </div>
      </div>
      </div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

  // 提供いただいたFirebase設定
  const firebaseConfig = {
    apiKey: "AIzaSyBCwEb0nAynWlcIYloAwwdDQocXgD1W8DQ",
    authDomain: "user-cd2c1.firebaseapp.com",
    projectId: "user-cd2c1",
    storageBucket: "user-cd2c1.firebasestorage.app",
    messagingSenderId: "990277200920",
    appId: "1:990277200920:web:952d974484fa76ed89e76d",
    measurementId: "G-30QNZ04PDZ"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();
  
  // 毎回Googleアカウントの選択画面を強制的に表示させる設定
  provider.setCustomParameters({
    prompt: 'select_account'
  });

  // ★ここが抜けていました！ログイン状態を監視し、ログイン済みなら main.html に飛ばす処理
  onAuthStateChanged(auth, (user) => {
    if (user) {
      window.location.href = 'main.html';
    }
  });

  // グローバル関数としてGoogleログインを定義
  window.signInWithGoogle = async () => {
    try {
      await signInWithPopup(auth, provider);
      // ※ログイン成功後の画面遷移は、すぐ上にある onAuthStateChanged が自動で行います
    } catch (error) {
      console.error("ログインエラー:", error);
      alert("ログインに失敗しました。もう一度お試しください。");
    }
  };
</script>
</body>
</html>
