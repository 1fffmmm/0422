<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>監視コントロールパネル (Debug Mode)</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #fdf6ee;
            --card: #fffaf5;
            --border: #f0e4d0;
            --accent: #d97a4a;
            --accent-light: #faeee4;
            --accent-mid: #e8a07a;
            --text-main: #3a2c1e;
            --text-sub: #a08060;
            --tag-bg: #fdecd8;
            --tag-text: #a05a2a;
            --tag-border: #f5d4b0;
            --shadow: 0 2px 18px rgba(180,110,60,0.09);
            --shadow-hover: 0 6px 28px rgba(180,110,60,0.16);
            --insta: linear-gradient(135deg, #f9c784 0%, #f07167 42%, #d63384 78%, #9b59b6 100%);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 15% 0%, rgba(240,160,100,0.18) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 100%, rgba(249,200,140,0.15) 0%, transparent 55%);
            min-height: 100vh;
            padding: 32px 16px 56px;
            color: var(--text-main);
        }

        .container {
            max-width: 440px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .card {
            background: var(--card);
            border-radius: 22px;
            padding: 22px 22px 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: box-shadow 0.25s;
        }
        .card:hover { box-shadow: var(--shadow-hover); }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
        }
        .card-title {
            display: flex;
            align-items: center;
            gap: 11px;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.01em;
            color: var(--text-main);
        }
        .icon-wrap {
            width: 34px; height: 34px;
            border-radius: 11px;
            background: var(--accent-light);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .icon-wrap svg {
            width: 17px; height: 17px;
            stroke: var(--accent);
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .btn-insta {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--insta);
            color: white;
            text-decoration: none;
            padding: 17px 20px;
            border-radius: 18px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.93rem;
            letter-spacing: 0.03em;
            box-shadow: 0 6px 22px rgba(214,51,132,0.22);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-insta:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(214,51,132,0.3); }

        .switch { position: relative; display: inline-block; width: 50px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; inset: 0;
            background: #e8d8c8; transition: .35s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: "";
            height: 20px; width: 20px; left: 4px; bottom: 4px;
            background: white; transition: .35s; border-radius: 50%;
            box-shadow: 0 1px 5px rgba(0,0,0,0.15);
        }
        input:checked + .slider { background: var(--accent); }
        input:checked + .slider:before { transform: translateX(22px); }

        .status { font-size: 0.77rem; color: var(--text-sub); margin-top: 10px; }

        .input-group { display: flex; gap: 8px; margin-bottom: 13px; }
        input[type="text"] {
            flex: 1; padding: 10px 14px;
            border: 1.5px solid var(--border); border-radius: 12px;
            font-family: 'Outfit', sans-serif; font-size: 0.9rem;
            color: var(--text-main); background: #fffdf9; outline: none;
        }

        .btn-add {
            background: var(--accent); color: white; border: none;
            padding: 0 17px; border-radius: 12px;
            font-family: 'Outfit', sans-serif; font-weight: 600;
            font-size: 1.3rem; cursor: pointer;
        }

        #keywords-list { display: flex; flex-wrap: wrap; gap: 7px; }

        .keyword-tag {
            display: inline-flex; align-items: center;
            background: var(--tag-bg); color: var(--tag-text);
            padding: 5px 13px; border-radius: 20px;
            font-size: 0.82rem; font-weight: 500;
            border: 1px solid var(--tag-border);
            animation: pop 0.2s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes pop { from { opacity:0; transform:scale(0.8); } to { opacity:1; transform:scale(1); } }

        .btn-del {
            margin-left: 8px; color: #d0a070; cursor: pointer;
            font-weight: 700; border: none; background: none;
        }

        .log-content {
            background: #fdf0e4; color: #7a4020;
            padding: 14px 16px; border-radius: 13px;
            font-family: 'Courier New', monospace; font-size: 0.81rem;
            min-height: 56px; white-space: pre-wrap;
            border: 1.5px solid #f0d8b8;
        }
        
        /* ログ表示ボックスの改善 */
#latest-analysis {
    background: var(--accent-light);
    color: var(--text-main);
    padding: 15px;
    border-radius: 12px;
    font-size: 0.95rem;
    line-height: 1.6;
    border: 1px solid var(--border);
    white-space: pre-wrap; /* 改行を反映 */
    
    /* ここが重要：高さを制限してスクロール可能に */
    max-height: 300px; 
    overflow-y: auto;
}

/* Pull to Refresh用のインジケーター（通常は隠しておく） */
#pull-indicator {
    text-align: center;
    height: 0;
    overflow: hidden;
    transition: height 0.2s ease;
    color: var(--accent);
    font-size: 0.8rem;
    font-weight: bold;
}
        
   /* 画像カード用のスタイル */
.image-grid {
    display: flex;
    gap: 10px;
    overflow-x: auto; /* スマホで横に並びきらない場合にスクロール可能に */
    padding-bottom: 5px;
}

.image-item {
    flex: 1; /* 横幅を均等に */
    min-width: 100px; /* 最小サイズ */
    aspect-ratio: 1 / 1; /* 正方形に統一 */
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
}

.image-item img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* 枠いっぱいにトリミング表示 */
    display: block;
}
        
    </style>
</head>
<body>
    <div class="container">

    
    <a href="https://www.instagram.com/stories/jr_official_/" target="_blank" class="btn-insta">
        Instagramストーリーを開く
    </a>

    <div class="card">
        <div class="card-header">
            <div class="card-title">
                <div class="icon-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </div>
                監視キーワード
            </div>
        </div>
        <div class="input-group">
            <input type="text" id="keyword-input" placeholder="新しいキーワードを入力…">
            <button class="btn-add" onclick="addKeyword()">＋</button>
        </div>
        <div id="keywords-list"></div>

    </div>
        
<div class="card" style="padding: 12px 22px;">
        <button class="btn-add" onclick="window.location.reload();" style="width: 100%; height: 48px; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 0.95rem;">
            <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" style="width: 18px; height: 18px;"><path d="M23 4v6h-6"></path><path d="M1 20v-6h6"></path><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
            最新の情報に更新
        </button>
    </div>
        
        
    <div class="card">
        <div class="card-header" style="margin-bottom:0;">
            <div class="card-title">
                <div class="icon-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                </div>
                プッシュ通知
            </div>
            <label class="switch">
                <input type="checkbox" id="push-switch">
                <span class="slider"></span>
            </label>
        </div>
        <div id="status-text" class="status">状態を確認中…</div>
    </div>

        <div class="card">
    <div class="card-header">
        <div class="card-title">
            <div class="icon-wrap">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
            </div>
            更新された画像
        </div>
    </div>
    <div class="image-grid">
        <div class="image-item">
            <img src="https://lh3.googleusercontent.com/d/1JlP_9aDbSkJSPI6JTtRXW5w4EHNGVkJH" alt="Latest image 1">
        </div>
        <div class="image-item">
            <img src="https://lh3.googleusercontent.com/d/1JlP_9aDbSkJSPI6JTtRXW5w4EHNGVkJH" alt="Latest image 2">
        </div>
        <div class="image-item">
            <img src="https://lh3.googleusercontent.com/d/1N18SGdHE8kmZeflUyhGrtcvtPNSY5UGT" alt="Latest image 3">
        </div>
    </div>
</div>
        
        
        
    <div class="card">
        <div class="card-header">
            <div class="card-title">
                <div class="icon-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                </div>
                最新の取得テキスト
            </div>
        </div>
        <div id="latest-analysis" class="log-content">読み込み中…</div>
        <div id="update-time" class="status"></div>
    </div>

</div>

<script>
    const SUPABASE_URL = 'https://ltqqmclfgdxtasvtirtf.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_iPDG85-2s9n0TBw-kVs55g_xC3ZSt-H';
    const VAPID_PUBLIC_KEY = 'BPjCNf2epwHU2U_a4X6d2zEfDzqRvmFYmXJrY2zUMR-h62JZG8bJ2Y5sXr0VaZp_XSaUkn0p3TH3X0_SCoD9p5A';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const pushSwitch = document.getElementById('push-switch');
    const statusText = document.getElementById('status-text');

    async function checkSubscription() {
        if (!('serviceWorker' in navigator)) { statusText.innerText = "非対応ブラウザです"; return; }
        const reg = await navigator.serviceWorker.ready;
        const sub = await reg.pushManager.getSubscription();
        pushSwitch.checked = !!sub;
        statusText.innerText = sub ? "通知は有効です" : "通知は無効です";
    }

    async function subscribeUser() {
        console.log("通知購読処理を開始しました");
        try {
            const reg = await navigator.serviceWorker.ready;
            const sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: VAPID_PUBLIC_KEY });
            console.log("ブラウザの購読成功:", sub.endpoint);
            const { error } = await supabaseClient.from('subscriptions').upsert(
                { endpoint: sub.endpoint, subscription_json: JSON.parse(JSON.stringify(sub)) },
                { onConflict: 'endpoint' }
            );
            if (error) throw error;
            statusText.innerText = "通知をオンにしました！";
            console.log("Supabaseへの保存完了");
        } catch (err) { 
            console.error("購読エラー:", err); 
            pushSwitch.checked = false; 
        }
    }

    async function unsubscribeUser() {
        const reg = await navigator.serviceWorker.ready;
        const sub = await reg.pushManager.getSubscription();
        if (sub) {
            console.log("通知解除中:", sub.endpoint);
            await supabaseClient.from('subscriptions').delete().eq('endpoint', sub.endpoint);
            await sub.unsubscribe();
        }
        statusText.innerText = "通知をオフにしました";
        console.log("通知を解除しました");
    }

    pushSwitch.addEventListener('change', () => pushSwitch.checked ? subscribeUser() : unsubscribeUser());

    async function loadKeywords() {
        console.log("キーワード読み込み中...");
        const { data, error } = await supabaseClient.from('keywords').select('*');
        if (error) { 
            console.error("データ取得エラー:", error); 
            return; 
        }
        console.log("取得データ:", data);
        const c = document.getElementById('keywords-list');
        c.innerHTML = data.map(k => `
            <span class="keyword-tag">${k.word}
                <button class="btn-del" onclick="deleteKeyword('${k.id}')">×</button>
            </span>`).join('');
    }

    async function addKeyword() {
        const input = document.getElementById('keyword-input');
        const word = input.value.trim();
        if (!word) return;

        console.log("キーワード追加試行:", word);
        const { count, error: ce } = await supabaseClient.from('keywords').select('*', { count: 'exact', head: true });
        if (ce) {
            console.error("件数確認エラー:", ce);
            return;
        }

        if (count >= 10) {
            alert("キーワードは最大10個までです。");
            return;
        }

        const { error } = await supabaseClient.from('keywords').insert([{ word }]);
        if (error) { 
            console.error("追加失敗:", error);
            alert("追加失敗: " + error.message); 
        } else { 
            console.log("追加成功");
            input.value = ''; 
            loadKeywords(); 
        }
    }

    async function deleteKeyword(id) {
        console.log("削除要求 ID:", id);
        const { error } = await supabaseClient.from('keywords').delete().eq('id', id);
        if (error) { 
            console.error("削除失敗:", error);
            alert("削除に失敗しました: " + error.message); 
        } else { 
            console.log("削除成功");
            loadKeywords(); 
        }
    }

    async function loadLatestAnalysis() {
        console.log("最新解析結果を取得中...");
        const { data } = await supabaseClient.from('analysis_logs').select('*')
            .order('updated_at', { ascending: false }).limit(1);
        if (data && data[0]) {
            console.log("解析ログ取得:", data[0]);
            document.getElementById('latest-analysis').innerText = data[0].content;
            document.getElementById('update-time').innerText = "最終更新: " + new Date(data[0].updated_at).toLocaleString('ja-JP');
        } else {
            document.getElementById('latest-analysis').innerText = "データがありません";
        }
    }

    window.addEventListener('load', () => {
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => {
                console.log("Service Worker 登録完了");
                checkSubscription(); loadKeywords(); loadLatestAnalysis();
            });
        }
    });

    

</script>
</body>
</html>
