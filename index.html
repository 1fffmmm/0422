<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="InstaMonitor">
    <title>InstaMonitor - 監視コントロールパネル</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gap-main: 16px; /* 余白を少し広めに */
            --bg: #fdf6ee;
            --card: #fffaf5;
            --border: #f0e4d0;
            --accent: #d97a4a;
            --accent-light: #faeee4;
            --accent-mid: #e8a07a;
            --text-main: #3a2c1e;
            --text-sub: #a08060;
            --tag-bg: #fdecd8;
            --tag-text: #a05a2a;
            --tag-border: #f5d4b0;
            --insta: linear-gradient(135deg, #f9c784 0%, #f07167 42%, #d63384 78%, #9b59b6 100%);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { overflow-x: hidden; touch-action: pan-y; }

        body {
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 15% 0%, rgba(240,160,100,0.18) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 100%, rgba(249,200,140,0.15) 0%, transparent 55%);
            min-height: 100vh;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* ローディング */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s ease;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid var(--accent-light);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* コンテナ（PCでは広く、スマホでは狭く） */
        .container {
            width: 100%;
            max-width: 960px; /* PC用に拡張 */
            padding: 20px 20px 80px;
            display: flex;
            flex-direction: column;
            gap: var(--gap-main);
            margin: 0 auto;
        }

        /* グリッドレイアウト（PC用） */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr; /* デフォルトは1列 */
            gap: var(--gap-main);
            width: 100%;
        }

        /* 画面幅が768px以上の時の設定 */
        @media (min-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr 1.2fr; /* PCでは2列に */
            }
            .grid-span-full {
                grid-column: 1 / -1; /* 横いっぱいに広げる要素用 */
            }
        }

        /* 各セクション */
        #auth-screen, #main-screen {
            display: none;
            width: 100%;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* スマホ用インストール画面 */
        #screen-install {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 9000;
            padding: 40px 20px;
            overflow-y: auto;
        }
        .install-container {
            max-width: 400px;
            margin: 0 auto;
            background: var(--card);
            padding: 40px 24px;
            border-radius: 24px;
            border: 1px solid var(--border);
            text-align: center;
            box-shadow: 0 8px 24px rgba(180,110,60,0.12);
        }

        /* ログインボックス（PCでは少し幅広に） */
        .login-box {
            max-width: 440px;
            margin: 60px auto;
            text-align: center;
        }

        /* カードデザイン */
        .card {
            background: var(--card);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid var(--border);
            height: fit-content;
        }
        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
        .card-title { display: flex; align-items: center; gap: 12px; font-size: 1rem; font-weight: 600; }
        .icon-wrap {
            width: 36px; height: 36px; border-radius: 12px; background: var(--accent-light);
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .icon-wrap svg { width: 18px; height: 18px; stroke: var(--accent); fill: none; stroke-width: 2; }

        /* ボタン */
        .btn-insta {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: var(--insta); color: white; text-decoration: none;
            padding: 18px; border-radius: 20px; font-weight: 600; transition: transform 0.2s;
        }
        .btn-insta:hover { transform: translateY(-2px); }

        .btn-primary {
            display: inline-flex; align-items: center; justify-content: center; gap: 10px;
            background: linear-gradient(135deg, var(--accent-mid) 0%, var(--accent) 100%);
            color: white; border: none; padding: 16px; border-radius: 18px;
            font-size: 1rem; font-weight: 600; cursor: pointer; width: 100%; transition: 0.2s;
        }

        /* スイッチ・入力 */
        .switch { position: relative; display: inline-block; width: 50px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #e8d8c8; transition: .3s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px; background: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background: var(--accent); }
        input:checked + .slider:before { transform: translateX(22px); }

        .input-group { display: flex; gap: 8px; margin-bottom: 16px; }
        input[type="text"] {
            flex: 1; padding: 12px 16px; border: 1.5px solid var(--border);
            border-radius: 14px; outline: none; background: #fffdf9;
        }
        .btn-add { background: var(--accent); color: white; border: none; width: 44px; height: 44px; border-radius: 14px; cursor: pointer; }

        #keywords-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .keyword-tag {
            background: var(--tag-bg); color: var(--tag-text); padding: 6px 14px; border-radius: 20px;
            font-size: 0.85rem; border: 1px solid var(--tag-border); display: flex; align-items: center;
        }
        .btn-del { margin-left: 8px; color: var(--accent); cursor: pointer; border: none; background: none; }

        /* テーマ切替 */
        .theme-btn-group { display: flex; gap: 10px; }
        .theme-btn { width: 34px; height: 34px; border-radius: 50%; border: 2.5px solid transparent; background: none; cursor: pointer; }
        .theme-btn.active { border-color: var(--accent); }
        .theme-swatch { width: 24px; height: 24px; border-radius: 50%; display: block; }
        .swatch-warm { background: linear-gradient(135deg, #faeee4, #d97a4a); }
        .swatch-cool { background: linear-gradient(135deg, #e8f0fb, #6fa3d8); }
        .swatch-mono { background: linear-gradient(135deg, #e8e8e8, #444444); }

        :root[data-theme="cool"] {
            --bg: #f0f5fc; --card: #f8fbff; --border: #d0e0f0; --accent: #4a7abf;
            --accent-light: #e4eef9; --accent-mid: #7aaad8; --text-main: #1e2c3a; --text-sub: #607080;
            --tag-bg: #ddeef8; --tag-text: #2a5a8a; --tag-border: #b0d4ee;
        }
        :root[data-theme="mono"] {
            --bg: #2a2a2a; --card: #333333; --border: #444444; --accent: #aaaaaa;
            --accent-light: #3d3d3d; --accent-mid: #888888; --text-main: #e8e8e8; --text-sub: #888888;
            --tag-bg: #3d3d3d; --tag-text: #cccccc; --tag-border: #555555;
        }
    </style>
</head>
<body>

    <div id="loading-overlay"><div class="spinner"></div></div>

    <section id="screen-install">
        <div class="install-container">
            <h1 style="font-size: 1.5rem; margin-bottom: 16px;">アプリをインストール</h1>
            <p style="font-size: 0.95rem; color: var(--text-sub); margin-bottom: 24px; text-align: left;">
                Safariでは通知機能が制限されるため、以下の手順でホーム画面に追加してご利用ください。
            </p>
            <div style="background: var(--bg); padding: 16px; border-radius: 12px; text-align: left; font-size: 0.9rem;">
                1. 共有ボタン（四角と矢印）をタップ<br>
                2. 「ホーム画面に追加」を選択<br>
                3. ホーム画面から再度起動
            </div>
        </div>
    </section>

    <div class="container">
        
        <section id="auth-screen">
            <div class="card login-box">
                <div style="font-size: 3rem; margin-bottom: 10px;">🔍</div>
                <h1 style="font-size: 1.5rem; margin-bottom: 8px;">InstaMonitor</h1>
                <p style="color: var(--text-sub); margin-bottom: 30px;">指定したキーワードがストーリーや<br>メディア情報に出現したら通知します。</p>
                <button onclick="signInWithGoogle()" class="btn-primary">Googleでログインして始める</button>
            </div>
        </section>

        <section id="main-screen">
            <div class="dashboard-grid">
                
                <div class="grid-span-full" style="display: flex; flex-direction: column; gap: 12px;">
                    <div class="card" style="padding: 16px 24px;">
                        <div style="display: flex; align-items: center; justify-content: space-between;">
                            <div style="display: flex; align-items: center; gap: 15px;">
                                <div class="icon-wrap">
                                    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                                </div>
                                <div id="user-email" style="font-weight: 500; color: var(--text-sub); font-size: 0.9rem;"></div>
                            </div>
                            <button onclick="signOut()" style="background:none; border:1px solid var(--border); padding:6px 12px; border-radius:10px; cursor:pointer; font-size:0.8rem;">ログアウト</button>
                        </div>
                    </div>
                    <button class="btn-primary" style="background: var(--card); color: var(--accent); border: 1px solid var(--border);" onclick="window.location.reload();">最新の情報に更新</button>
                </div>

                <div style="display: flex; flex-direction: column; gap: var(--gap-main);">
                    <div class="card">
                        <div class="card-header">
                            <div class="card-title">通知マスター設定</div>
                            <label class="switch">
                                <input type="checkbox" id="push-switch">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div id="status-text" style="font-size: 0.8rem; color: var(--text-sub); margin-bottom: 15px;">状態を確認中…</div>
                        <div id="notification-sub-settings" style="border-top: 1px solid var(--border); padding-top: 15px; display: none; flex-direction: column; gap: 12px;">
                            <div style="display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem;">
                                <span>📸 インスタ通知</span>
                                <label class="switch" style="transform: scale(0.8);"><input type="checkbox" id="insta-switch" checked><span class="slider"></span></label>
                            </div>
                            <div style="display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem;">
                                <span>📺 メディア通知</span>
                                <label class="switch" style="transform: scale(0.8);"><input type="checkbox" id="media-switch" checked><span class="slider"></span></label>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <div class="card-title">監視キーワード</div>
                        </div>
                        <div class="input-group">
                            <input type="text" id="keyword-input" placeholder="キーワードを入力…">
                            <button class="btn-add" onclick="addKeyword()">＋</button>
                        </div>
                        <div id="keywords-list"></div>
                    </div>
                </div>

                <div style="display: flex; flex-direction: column; gap: var(--gap-main);">
                    <div class="card">
                        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px;">
                            <span>📢</span><h2 style="font-size: 1.1rem;">最新のお知らせ</h2>
                        </div>
                        <div id="announcement-content" style="padding: 12px; background: var(--accent-light); border-radius: 12px; font-size: 0.95rem; line-height: 1.5;">読み込み中...</div>
                        <div id="announcement-time" style="font-size: 0.75rem; color: var(--text-sub); margin-top: 8px; text-align: right;"></div>
                    </div>

                    <a href="https://www.instagram.com/stories/jr_official_/" target="_blank" class="btn-insta">Instagramストーリーを開く</a>

                    <div class="card">
                        <div class="card-header" style="margin-bottom:0;">
                            <div class="card-title">テーマ</div>
                            <div class="theme-btn-group">
                                <button class="theme-btn active" id="btn-warm" onclick="setTheme('warm')"><span class="theme-swatch swatch-warm"></span></button>
                                <button class="theme-btn" id="btn-cool" onclick="setTheme('cool')"><span class="theme-swatch swatch-cool"></span></button>
                                <button class="theme-btn" id="btn-mono" onclick="setTheme('mono')"><span class="theme-swatch swatch-mono"></span></button>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </section>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut as firebaseSignOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy, limit, serverTimestamp, setDoc, getDoc, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-messaging.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBCwEb0nAynWlcIYloAwwdDQocXgD1W8DQ",
        authDomain: "user-cd2c1.firebaseapp.com",
        projectId: "user-cd2c1",
        storageBucket: "user-cd2c1.firebasestorage.app",
        messagingSenderId: "990277200920",
        appId: "1:990277200920:web:952d974484fa76ed89e76d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let messaging;
    try { messaging = getMessaging(app); } catch(e) {}

    let currentUser = null;

    // 認証状態の監視
    onAuthStateChanged(auth, async (user) => {
        const authScreen = document.getElementById('auth-screen');
        const mainScreen = document.getElementById('main-screen');
        const screenInstall = document.getElementById('screen-install');
        const overlay = document.getElementById('loading-overlay'); 

        const ua = navigator.userAgent.toLowerCase();
        const isIOS = /iphone|ipad|ipod/.test(ua);
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

        // PCブラウザならそのまま通す。iOS Safariかつ非PWAの時だけ案内を出す。
        if (isIOS && !isStandalone) {
            screenInstall.style.display = 'block';
            overlay.style.display = 'none';
            return;
        }

        if (user) {
            currentUser = user;
            authScreen.style.display = 'none';
            mainScreen.style.display = 'block';
            document.getElementById('user-email').innerText = user.email;
            checkPushSubscription(user.uid);
            loadKeywords();
            fetchLatestAnnouncement(user.uid);
        } else {
            currentUser = null;
            mainScreen.style.display = 'none';
            authScreen.style.display = 'block';
        }
        overlay.style.opacity = '0';
        setTimeout(() => overlay.style.display = 'none', 300);
    });

    // ログイン・ログアウト
    window.signInWithGoogle = () => {
        const provider = new GoogleAuthProvider();
        provider.setCustomParameters({ prompt: 'select_account' });
        signInWithPopup(auth, provider).catch(console.error);
    };

    window.signOut = async () => {
        if (currentUser) await deleteDoc(doc(db, 'subscriptions', currentUser.uid));
        await firebaseSignOut(auth);
    };

    // キーワード操作
    function loadKeywords() {
        const q = query(collection(db, 'keywords'), where('user_id', '==', currentUser.uid), orderBy('createdAt', 'desc'));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('keywords-list');
            list.innerHTML = '';
            snapshot.forEach((docSnap) => {
                const el = document.createElement('div');
                el.className = 'keyword-tag';
                el.innerHTML = `${docSnap.data().keyword} <button class="btn-del" onclick="deleteKeyword('${docSnap.id}')">×</button>`;
                list.appendChild(el);
            });
        });
    }

    window.addKeyword = async () => {
        const input = document.getElementById('keyword-input');
        if (!input.value.trim()) return;
        await addDoc(collection(db, 'keywords'), { keyword: input.value.trim(), user_id: currentUser.uid, createdAt: serverTimestamp() });
        input.value = '';
    };

    window.deleteKeyword = (id) => deleteDoc(doc(db, 'keywords', id));

    // お知らせ取得
    async function fetchLatestAnnouncement(uid) {
        const q = query(collection(db, "analysis_logs"), where("user_id", "==", uid), orderBy("updated_at", "desc"), limit(1));
        const snap = await getDocs(q);
        const contentEl = document.getElementById('announcement-content');
        if (!snap.empty) {
            const data = snap.docs[0].data();
            contentEl.innerText = data.message;
            if (data.updated_at) document.getElementById('announcement-time').innerText = "更新: " + data.updated_at.toDate().toLocaleString();
        } else {
            contentEl.innerText = "お知らせはありません";
        }
    }

    // 通知スイッチの挙動
    const pushSwitch = document.getElementById('push-switch');
    pushSwitch.addEventListener('change', async (e) => {
        if (!currentUser) return;
        if (e.target.checked) {
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                const token = await getToken(messaging, { vapidKey: 'BFfTYmGpeE2ts6TGdboKiHvX7qlGkum04E1RkMrfSVmOryVGXFEDM8SC3OuAdvhoJRpzFpZu1S36XEin9weDzkQ' });
                await setDoc(doc(db, 'subscriptions', currentUser.uid), { user_id: currentUser.uid, fcm_token: token, updated_at: serverTimestamp(), insta_enabled: true, media_enabled: true });
                document.getElementById('status-text').innerText = "通知設定：ON";
                document.getElementById('notification-sub-settings').style.display = 'flex';
            } else {
                e.target.checked = false;
            }
        } else {
            await deleteDoc(doc(db, 'subscriptions', currentUser.uid));
            document.getElementById('status-text').innerText = "通知設定：OFF";
            document.getElementById('notification-sub-settings').style.display = 'none';
        }
    });

    async function checkPushSubscription(uid) {
        const docSnap = await getDoc(doc(db, 'subscriptions', uid));
        if (docSnap.exists()) {
            pushSwitch.checked = true;
            document.getElementById('status-text').innerText = "通知設定：ON";
            document.getElementById('notification-sub-settings').style.display = 'flex';
        }
    }

    // テーマ設定
    window.setTheme = (theme) => {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`btn-${theme}`).classList.add('active');
    };
    setTheme(localStorage.getItem('theme') || 'warm');

</script>
</body>
</html>
