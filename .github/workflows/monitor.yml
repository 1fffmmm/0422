name: Integrated Monitor System

on:
  schedule:
    # 毎日数回定期実行したい場合はここを設定
    - cron: '0 3,6,9,12 * * *' 
  workflow_dispatch:      # 手動実行用

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Japanese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-ipafont-gothic fonts-ipafont-mincho

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Xスクレイピング用のブラウザをインストール
          playwright install chromium --with-deps

      - name: Run Integrated System
        env:
          # --- Firebase用 ---
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          
          # --- Instagram & Gemini & ImgBB用 ---
          INSTA_SESSION_ID: ${{ secrets.INSTA_SESSION_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
          # --- 通知システム(notifier.py)用 ---
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_EMAIL: ${{ secrets.VAPID_EMAIL }}
          
          # --- X(Twitter) スクレイピング用 (新規追加) ---
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          
          # --- 不要になるため削除可 (Google Drive用) ---
          # GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          # TWEET_FILE_ID: ${{ secrets.TWEET_FILE_ID }}
        run: python main.py
