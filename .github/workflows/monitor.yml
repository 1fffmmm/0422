name: Google Drive Monitor

on:
  schedule:
    # 毎日 日本時間 23:00 に実行 (UTCでは14:00)
    - cron: '0 14 * * *'
  workflow_dispatch: # 手動実行のボタンは残しておきます

jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install google-api-python-client google-auth pywebpush supabase

      - name: Run monitor script
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          DRIVE_FILE_ID: ${{ secrets.DRIVE_FILE_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}  # ← これを追加！
        run: python monitor.py
