name: Google Drive Monitor

on:
  schedule:
    # UTC時間で指定 (JST-9時間) [cite: 6]
    # 0:15(9:15), 6:15(15:15), 12:15(21:15)
    - cron: '15 0,6,12 * * *'
  workflow_dispatch: # 手動実行用ボタン

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install google-api-python-client google-auth pywebpush supabase

      - name: Run monitor script
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          DRIVE_FILE_ID: ${{ secrets.DRIVE_FILE_ID }}
        run: python monitor.py
        
