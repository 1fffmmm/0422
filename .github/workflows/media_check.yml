name: Media Scraper

on:
  schedule:
    - cron: '30 13 * * *' # 日本時間 22:30 実行 (UTC 13:30)
  workflow_dispatch:      # 手動実行ボタン用

jobs:
  build:
    runs-on: ubuntu-latest
steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # --- 【追加】日本語フォントをインストールするステップ ---
      - name: Install Japanese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-ipafont-gothic fonts-ipafont-mincho
      # ----------------------------------------------------

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run script
        env:
          # Firebase用 (scraping_media.pyで使用)
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          
          # 通知用 (notifier.pyが内部で使用するため必須)
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_EMAIL: ${{ secrets.VAPID_EMAIL }} # もし設定していれば
        run: python scraping_media.py
