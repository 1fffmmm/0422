name: X Scraper and Notification

on:
  schedule:
    # 例: 毎日日本時間の 12:00 と 20:00 に実行 (UTC指定のため-9時間)
    - cron: '0 3,11 * * *'
  # 手動実行用ボタンも有効化しておきます
  workflow_dispatch:

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10' # 普段お使いのバージョンに合わせてください

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 必要なライブラリをインストール
        pip install playwright firebase-admin
        # PlaywrightのブラウザとOS依存パッケージをインストール
        playwright install chromium --with-deps

    - name: Run Scraper and Notifier
      env:
        # GitHub Secrets から環境変数を展開
        X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
        FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      run: |
        python scraping_x.py
