name: Test WebPush Notification

on:
  workflow_dispatch: # これを書くとGitHub上のボタンから手動実行できるようになります

jobs:
  test-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pywebpush supabase

      - name: Run test push script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          # もし PRIVATE_VAPID_KEY をコードに直書きしていない場合は、ここに追加
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
        run: python test_push.py
